# ============================================
# Source configuration
# ============================================
#
# Each source defines where and how to scrape events.
#
# Fields:
#   name:             Human-readable name
#   base_url:         Root URL of the source site
#   fetch_method:     'requests' (default) or 'playwright' (for JS-rendered pages)
#   pre_filtered:     true if the source only lists kids/family events
#                     (skips audience filtering in LLM prompt)
#   is_active:        false to disable without deleting
#
#   listing:
#     urls:           List of listing page URLs to scrape
#     pagination:     Pagination strategy (none / path / query)
#     max_pages:      Max pages to follow (default: 5)
#     page_pattern:   URL pattern for pagination (use {page} placeholder)
#
#   defaults:         Default values applied to every event from this source
#                     (only used when LLM returns null for that field)
#     venue_name:     Venue name (e.g. "Nowohuckie Centrum Kultury")
#     venue_address:  Full address (e.g. "os. Centrum C 10, Kraków")
#     district:       Kraków district (e.g. "Nowa Huta")
#     organizer_name: Organizer name
#     is_free:        true/false — default free status when price is unknown
#
#   events:
#     mode:           'links' (follow links to individual pages) or
#                     'inline' (all event data is on the listing page)
#     link_selector:  CSS selector to find event links (for mode: links)
#
#   notes:            Free-text notes for your team
#
# ============================================

sources:

  - name: "Nowohuckie Centrum Kultury"
    base_url: "https://nck.krakow.pl/wydarzenia/filtruj/wydarzenia-0-0-0-62-0-0/"
    fetch_method: requests
    pre_filtered: true
    is_active: true
    defaults:
      venue_name: "Nowohuckie Centrum Kultury"
      venue_address: "al. Jana Pawła II 232, 31-913 Kraków"
      district: "Nowa Huta"
      organizer_name: "Nowohuckie Centrum Kultury"
      is_free: true
    listing:
      urls:
        - "https://nck.krakow.pl/wydarzenia/filtruj/wydarzenia-0-0-0-62-0-0/"
      pagination: path
      max_pages: 5
      page_pattern: "https://nck.krakow.pl/wydarzenia/filtruj/wydarzenia-0-0-0-62-0-0/page/{page}/"
    events:
      mode: inline
    notes: "Events listed inline on listing pages. Pagination via /page/2/, /page/3/ etc."

